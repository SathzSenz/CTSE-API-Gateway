services:

  auth:
    build:
      context: ../CTSE-Auth-Service
      dockerfile: Dockerfile
    container_name: auth
    env_file:
      - ../CTSE-Auth-Service/.env
    ports:
      - "4000:4000"
      - "50051:50051"

  order:
    build:
      context: ../CTSE-Order-Service
      dockerfile: Dockerfile
    container_name: order
    env_file:
      - ../CTSE-Order-Service/.env
    ports:
      - "6969:6969"
      - "50052:50052"
    depends_on:
      - auth

  gateway:
    build: .
    container_name: gateway
    ports:
      - "80:80"
    depends_on:
      - auth
      - order